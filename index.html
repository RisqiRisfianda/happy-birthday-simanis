<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HBD Sayaang ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>

<body>

<div id="hearts"></div>

<section class="opening">

    <div class="opening-card">

        <button onclick="openGift()">
            <h1>Kado buat sayaang 🎁</h1>
        </button>

    </div>

</section>

<section class="hero" id="hero">

    <img src="assets/cover.jpg" alt="Simanis">

    <h1>Happy Birthday Sayaang ❤️</h1>

</section>

<section class="scrapbook">

    <div class="photos">

        <div class="photo rotate-left">
            <img src="assets/photo1.jpg">
            <span>☕ First Date</span>
        </div>

        <div class="photo rotate-right">
            <img src="assets/photo2.jpg">
            <span>🌸 Random Day</span>
        </div>

        <div class="photo rotate-left">
            <img src="assets/photo3.jpg">
            <span>🥰 My Favorite Smile</span>
        </div>

        <div class="photo rotate-right">
            <img src="assets/photo4.jpg">
            <span>❤️ Us</span>
        </div>

        <div class="photo rotate-left">
            <img src="assets/photo5.jpg">
            <span>✨ Little Memory</span>
        </div>

        <div class="photo rotate-right">
            <img src="assets/photo6.jpg">
            <span>📸 Another Happy Day</span>
        </div>

        <div class="photo rotate-left">
            <img src="assets/photo7.jpg">
            <span>🌷 Cute Moment</span>
        </div>

        <div class="photo rotate-right">
            <img src="assets/photo8.jpg">
            <span>💕 You & Me</span>
        </div>

        <div class="photo rotate-left">
            <img src="assets/photo9.jpg">
            <span>🎂 Birthday Girl</span>
        </div>

    </div>

</section>

<section class="letter">

<div class="letter-card" onclick="openLetter()">

    <div class="letter-icon">
        💌
    </div>

    <p>Ada pesan buat kamu 😊</p>

</div>

<div id="letter" class="letter-content">

    <p>Hi Sayaang ❤️</p>

    <p>
        [ISI SURAT DISINI]
    </p>

</div>

</section>

<section class="ending">

    <h1>✨</h1>

    <h2>Terima kasih</h2>

    <p>
        sudah menjadi bagian dari hidup aku ❤️
    </p>

    <button onclick="sendHug()">
        🤗 Peluk dulu siniii
    </button>

    <div id="hugResult"></div>

</section>

<script src="script.js"></script>

</body>
</html>
